<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        const map = L.map('map').setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
        maxZoom: 19,
        }).addTo(map);

        // Хранилище линий
        let polylines = [];

        // 👉 функция для отрисовки траектории
        function drawTrack(points, color) {

        // удалить старые линии
        polylines.forEach(p => map.removeLayer(p));
        polylines = [];

        let poly = L.polyline(points, {
        color: color,
        weight: 3
        }).addTo(map);

        polylines.push(poly);
        }


    </script>

</body>
</html>
